<div class="flex flex-col gap-4">
  <h3 class="text-black dark:text-white text-xl font-bold">Escribe tu reseña</h3>
  <div class="flex flex-col gap-4 p-6 bg-gray-100 dark:bg-white/5 rounded-xl">
    <div class="flex items-center gap-4">
      <img class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10"
        [attr.alt]="'Avatar of user ' + usuarioNombre" [src]="imagenAvatar()" />
      <div class="flex flex-col">
        <p class="text-black dark:text-white font-semibold">{{usuarioNombre}}</p>
        <div class="flex gap-1 text-gray-400 dark:text-gray-500 cursor-pointer">
          <span
            class="material-symbols-outlined text-xl! hover:text-yellow-400 dark:hover:text-yellow-500 transition-colors">star_outline</span>
          <span
            class="material-symbols-outlined text-xl! hover:text-yellow-400 dark:hover:text-yellow-500 transition-colors">star_outline</span>
          <span
            class="material-symbols-outlined text-xl! hover:text-yellow-400 dark:hover:text-yellow-500 transition-colors">star_outline</span>
          <span
            class="material-symbols-outlined text-xl! hover:text-yellow-400 dark:hover:text-yellow-500 transition-colors">star_outline</span>
          <span
            class="material-symbols-outlined text-xl! hover:text-yellow-400 dark:hover:text-yellow-500 transition-colors">star_outline</span>
        </div>
      </div>
    </div>
    <textarea aria-label="Escribe tu reseña"
      class="form-textarea w-full resize-y rounded-lg text-black dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border-gray-300 dark:border-white/20 bg-gray-200 dark:bg-white/5 h-28 placeholder:text-gray-500 dark:placeholder:text-gray-500 text-base font-normal leading-normal p-4"
      placeholder="Comparte tu opinión sobre este libro..."></textarea>
    <div class="flex justify-end">
      <button type="button" aria-label="Publicar reseña"
        class="flex min-w-21 max-w-120 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-5 bg-primary text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors">
        <span class="truncate">Publicar Reseña</span>
      </button>
    </div>
  </div>
</div>
