<div class="border-t border-white/10 pt-4 mt-2">
    <h3 class="text-black dark:text-white text-lg font-bold mb-3">Detalles</h3>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-2 text-sm">
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">Género</span>
            <span class="text-gray-700 dark:text-gray-300">{{ generosTexto() }}</span>
        </div>
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">Publicado</span>
            <span class="text-gray-700 dark:text-gray-300">{{ yearTexto() }}</span>
        </div>
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">Editorial</span>
            <span class="text-gray-700 dark:text-gray-300">{{ editorial() }}</span>
        </div>
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">Páginas</span>
            <span class="text-gray-700 dark:text-gray-300">{{ paginasTexto() }}</span>
        </div>
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">Idioma Original</span>
            <span class="text-gray-700 dark:text-gray-300">{{ idiomaTexto() }}</span>
        </div>
        <div class="flex flex-col">
            <span class="font-semibold text-gray-500 dark:text-gray-400">ISBN</span>
            <span class="text-gray-700 dark:text-gray-300">{{ isbnTexto() }}</span>
        </div>
    </div>
</div>
