<div class="flex flex-col gap-4 p-6 border border-gray-200 dark:border-white/10 rounded-xl">
    <div class="flex items-center gap-4">
        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10"
            role="img"
            [attr.aria-label]="'Avatar of user ' + usuarioNombre"
            style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAmczh5KSzL9J2A_YyRnxGDJibuwEsOgI23gyPyF4XQhe0gZ3GkXpA__-77e_yH_ecOlu9eAPh1Ex_yzcMfhhVtE5YOVbg5SqWeiUBcrjdWY2KzvnjdbTMuR4SRVYgkiDiulMfeV5TmjpR5_9dB9FKYXta5vTqDqmnsD5wqv2Oa1hXV3YbS60kshREqXANfLYtLGCRVl4Cs5A73eI0FiuF7E25lVEcJNif0dL_RPR9UiWHsJp_pC7QbTiewyRlwf8UNDXFPnOMB-Q");'>
        </div>
        <div class="flex-1">
            <p class="font-semibold text-black dark:text-white">
                <span>{{usuarioNombre || ""}}</span> - <span>{{critica().titulo_critica || ""}}</span>
            </p>
            <div class="flex items-center gap-2">
                <app-estrellas-puntuacion [puntuacion]="critica().calificacion_libro | puntuacionNormalizada"></app-estrellas-puntuacion>
                <p class="text-xs text-gray-500 dark:text-gray-400">
                    {{critica().fecha_critica | tiempoRelativo}}
                </p>
            </div>
        </div>
    </div>
    <p class="text-gray-700 dark:text-gray-300 text-sm leading-relaxed">{{critica().texto_critica || ""}}</p>
</div>
