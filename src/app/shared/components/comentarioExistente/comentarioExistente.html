<div class="flex flex-col gap-4 p-6 border border-gray-200 dark:border-white/10 rounded-xl">
  <div class="flex items-center gap-8">
    <div class="flex flex-col gap-1 items-center">
      <p class="font-semibold text-black dark:text-white">
        <span>{{usuarioNombre || ""}}</span>
      </p>
      <img class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10"
        [attr.alt]="'Avatar of user ' + usuarioNombre" [src]="imagenAvatar()" />
    </div>
    <div class="flex flex-col gap-2">
      <p class="font-semibold text-black dark:text-white">
        <span>{{tituloComentario}}</span>
      </p>
      <div class="flex flex-col items-center gap-2">
        <p class="text-xs text-gray-500 dark:text-gray-400 self-start">
          {{fechaComentario | tiempoRelativo}}
        </p>
        <div [class.hidden]="calificacion == null">
          <app-estrellas-puntuacion [puntuacion]="calificacion | puntuacionNormalizada">
          </app-estrellas-puntuacion>
        </div>
      </div>
    </div>
  </div>
  <p class="text-gray-700 dark:text-gray-300 text-sm leading-relaxed" [innerHTML]="textoComentario | linebreaks"></p>
</div>
