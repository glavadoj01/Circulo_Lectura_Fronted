<div class="flex flex-col gap-6 md:col-span-1 items-center md:items-start">
  <div class="w-full max-w-75 md:max-w-none shadow-2xl shadow-black/50">
    <div class="w-full gap-1 overflow-hidden bg-background-element @[480px]:gap-2 aspect-2/3 rounded-xl flex">
      <img [src]="portadaLibro()" alt="Portada del libro {{ tituloLibro() }}"
        class="w-full aspect-auto rounded-xl object-cover object-center">
    </div>
  </div>
  <button type="button" aria-label="Añadir este libro a mi lista"
    class="flex min-w-21 w-full max-w-75 md:max-w-none cursor-pointer items-center justify-center overflow-hidden rounded-lg max-h-12 px-5 flex-1 bg-primary text-blanco-puro text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors">
    <span class="truncate">Añadir a mi lista</span>
  </button>
</div>
